<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>わたしはさいきょう！</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+Black&family=Rubik+Dirt&display=swap');

:root {
  --red: #cc1100; --red2: #ff2200;
  --dark: #050000; --white: #ffffff; --gold: #ffcc00;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; background: var(--dark); overflow: hidden;
  font-family: 'Zen Kaku Gothic Black', 'Noto Sans JP', sans-serif;
  color: var(--white); touch-action: manipulation;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
body::after {
  content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
}

/* ── SCREENS ── */
.screen {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.4s ease; overflow: hidden;
}
.screen.active { opacity: 1; pointer-events: all; }

#overlay { position: fixed; inset: 0; z-index: 500; background: #000; opacity: 0; pointer-events: none; transition: opacity 0.35s ease; }
#overlay.show { opacity: 1; pointer-events: all; }
#impact-flash { position: fixed; inset: 0; z-index: 400; background: white; opacity: 0; pointer-events: none; }
#impact-flash.flash { animation: flashAnim 0.3s ease-out forwards; }
@keyframes flashAnim { 0%{opacity:0.95} 100%{opacity:0} }

.corner { position: absolute; width: 22px; height: 22px; border-color: var(--red2); border-style: solid; opacity: 0.55; }
.corner.tl { top:10px; left:10px; border-width: 2px 0 0 2px; }
.corner.tr { top:10px; right:10px; border-width: 2px 2px 0 0; }
.corner.bl { bottom:10px; left:10px; border-width: 0 0 2px 2px; }
.corner.br { bottom:10px; right:10px; border-width: 0 2px 2px 0; }

@keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes fadeUp   { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@keyframes titlePop { from{transform:scale(0.7) rotate(-4deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
@keyframes arenaEnter { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
.arena-animate { animation: arenaEnter 0.5s ease 0.2s both; }

/* ══ START ══ */
#screen-start { z-index: 10; background: var(--dark); }
#screen-start .bg {
  position: absolute; inset: 0;
  background: url('assets/start-bg.png') center top/cover;
  opacity: 0.5; filter: saturate(1.3) contrast(1.1);
}
#screen-start .vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.88) 100%);
}
.start-content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; gap: clamp(8px,2vh,18px); padding: 20px; text-align: center;
}
.start-eyecatch {
  font-size: clamp(9px,1.7vw,12px); color: var(--red2);
  letter-spacing: 0.35em; text-transform: uppercase;
  animation: blink 1.2s step-end infinite;
}

/* ロゴ画像 */
.start-logo {
  width: clamp(200px, 45vw, 480px);
  height: auto;
  animation: titlePop 0.7s cubic-bezier(0.22,0.61,0.36,1) both;
  filter: drop-shadow(0 4px 20px rgba(200,0,0,0.5));
}

/* はじめるボタン画像 */
.start-btn-img {
  width: clamp(160px, 35vw, 340px);
  height: auto;
  cursor: pointer;
  animation: fadeUp 0.6s ease 0.7s both;
  transition: transform 0.12s, filter 0.12s;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
}
.start-btn-img:hover { transform: scale(1.05); filter: drop-shadow(0 4px 20px rgba(255,50,0,0.6)); }
.start-btn-img:active { transform: scale(0.96); }

/* ══ BATTLE ══ */
#screen-battle { z-index: 10; }
#screen-battle .bg {
  position: absolute; inset: 0;
  background: url('assets/battle-bg.png') center/cover; opacity: 0.65;
}
#screen-battle .vignette {
  position: absolute; inset: 0;
  background:
    linear-gradient(to top, rgba(0,0,0,0.82) 0%, transparent 45%),
    linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 30%);
}
.battle-ui {
  position: relative; z-index: 1; width: 100%; height: 100%;
  display: grid; grid-template-rows: auto 1fr auto;
  padding: clamp(8px,1.5vh,14px) clamp(10px,2vw,18px);
  gap: clamp(6px,1.2vh,12px);
}

/* HP */
.hp-section { display: flex; gap: 10px; }
.hp-block { flex: 1; }
.hp-label { font-size: clamp(9px,1.6vw,12px); color: rgba(255,255,255,0.55); letter-spacing: 0.1em; margin-bottom: 3px; }
.hp-track { height: clamp(8px,1.4vh,12px); background: rgba(0,0,0,0.65); border: 1px solid rgba(255,255,255,0.13); position: relative; overflow: hidden; }
.hp-fill { height: 100%; position: relative; transition: width 0.5s ease; }
.hp-fill::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(90deg,transparent 0,transparent 8px,rgba(255,255,255,0.12) 8px,rgba(255,255,255,0.12) 9px); }
.hp-fill.player { width: 17%; background: linear-gradient(90deg,#11aa33,#44ff66); }
.hp-fill.enemy  { width: 100%; background: linear-gradient(90deg,#cc4400,#ff8800); margin-left: auto; }
.hp-nums { font-size: clamp(9px,1.4vw,11px); color: rgba(255,255,255,0.5); margin-top: 2px; }
.hp-nums .cur { font-size: 1.4em; color: var(--white); }
.hp-block.right .hp-label { text-align: right; }
.hp-block.right .hp-track { direction: rtl; }
.hp-block.right .hp-nums { text-align: right; }

/* Arena */
.arena { display: flex; align-items: flex-end; justify-content: space-between; padding: 0 clamp(6px,2.5vw,28px); position: relative; }

/* Player */
.player-side { display: flex; flex-direction: column; align-items: center; gap: 4px; }
#player-root {
  position: relative; width: clamp(78px,16vw,138px); height: clamp(88px,18vw,155px);
  transition: transform 0.18s cubic-bezier(0.25,0.46,0.45,0.94); will-change: transform;
}
#player-root.instant { transition: none; }
#player-sprite { width: 100%; height: 100%; object-fit: contain; object-position: bottom center; display: block; filter: drop-shadow(0 4px 12px rgba(255,200,100,0.28)); }
#player-sprite.idle { animation: idleBob 2.4s ease-in-out infinite; }
@keyframes idleBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
#speed-lines { position: absolute; inset: 0; pointer-events: none; opacity: 0; background: repeating-linear-gradient(-10deg,transparent 0,transparent 6px,rgba(255,255,255,0.2) 6px,rgba(255,255,255,0.2) 7px); transition: opacity 0.08s; }
#speed-lines.show { opacity: 1; }
#impact-ring { position: absolute; top: 45%; left: 100%; width: 0; height: 0; transform: translate(-50%,-50%); pointer-events: none; border-radius: 50%; }
#impact-ring.burst { animation: ringBurst 0.42s ease-out forwards; }
@keyframes ringBurst {
  0%  { width:0;height:0;border:5px solid rgba(255,210,50,0.9);opacity:1; }
  100%{ width:160px;height:160px;border:2px solid rgba(255,80,0,0);opacity:0; }
}

/* Enemy */
.enemy-side { display: flex; flex-direction: column; align-items: center; gap: 4px; }
#enemy-root { width: clamp(85px,17vw,148px); height: clamp(100px,20vw,170px); position: relative; }
#enemy-img { width: 100%; height: 100%; object-fit: contain; object-position: bottom; animation: enemyFloat 3s ease-in-out infinite; filter: drop-shadow(0 0 14px rgba(200,0,0,0.55)); }
@keyframes enemyFloat { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-8px) scale(1.02)} }
#enemy-root.hit { animation: enemyHit 0.35s ease-out; }
@keyframes enemyHit { 0%{transform:translateX(0)} 20%{transform:translateX(-13px)} 40%{transform:translateX(10px)} 60%{transform:translateX(-7px)} 80%{transform:translateX(5px)} 100%{transform:translateX(0)} }

/* 爆発：ゆっくり2.0秒 */
#enemy-root.exploding #enemy-img { animation: enemyExplode 2.0s ease-out forwards !important; }
@keyframes enemyExplode {
  0%   { transform:scale(1);   opacity:1; filter:brightness(1)  drop-shadow(0 0 14px rgba(200,0,0,0.55)); }
  20%  { transform:scale(1.5); opacity:1; filter:brightness(5)  saturate(0) drop-shadow(0 0 40px white); }
  50%  { transform:scale(2.2); opacity:0.8; filter:brightness(10); }
  80%  { transform:scale(3.0); opacity:0.3; filter:brightness(6); }
  100% { transform:scale(3.8); opacity:0; }
}
.dead-flash { position: absolute; inset: -18px; background: url('assets/enemy-dead.png') center/contain no-repeat; opacity: 0; pointer-events: none; }
#enemy-root.exploding .dead-flash { animation: deadFlash 2.0s ease-out forwards; }
@keyframes deadFlash {
  0%  { opacity:0; transform:scale(0.5); }
  25% { opacity:1; transform:scale(1.4); }
  60% { opacity:0.8; transform:scale(1.8); }
  100%{ opacity:0; transform:scale(2.5); }
}

.char-label { font-size: clamp(9px,1.5vw,11px); color: rgba(255,255,255,0.5); letter-spacing: 0.1em; }
.vs-badge { font-family:'Rubik Dirt',cursive; font-size: clamp(18px,4vw,36px); color: var(--red2); text-shadow: 2px 2px 0 #660000; align-self: center; flex-shrink: 0; padding: 0 4px; animation: vsPulse 1.8s ease-in-out infinite; }
@keyframes vsPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:0.72} }

.action-area { display: flex; flex-direction: column; align-items: center; gap: clamp(5px,1.1vh,9px); transition: opacity 0.3s ease; }
.action-area.hidden { opacity: 0; pointer-events: none; }
.action-hint { font-size: clamp(9px,1.7vw,12px); color: var(--red2); letter-spacing: 0.2em; text-transform: uppercase; animation: blink 1s step-end infinite; }

/* スキルボタン */
.skill-btn {
  font-family: 'Zen Kaku Gothic Black', sans-serif;
  font-size: clamp(15px,3.2vw,25px); color: var(--dark); background: var(--white);
  border: none; cursor: pointer;
  padding: clamp(10px,1.8vh,16px) clamp(18px,4vw,44px);
  clip-path: polygon(12px 0%,100% 0%,calc(100% - 12px) 100%,0% 100%);
  letter-spacing: 0.06em; position: relative; overflow: hidden; transition: transform 0.12s;
}
.skill-btn::before { content: ''; position: absolute; inset: 0; background: var(--red2); transform: translateX(-110%); transition: transform 0.22s ease; }
.skill-btn:hover::before { transform: translateX(0); }
.skill-btn:hover, .skill-btn:hover .btn-txt { color: var(--white); }
.skill-btn:active, .skill-btn.pressed { transform: scale(0.96); background: var(--red2); color: var(--white); }
.skill-btn.pressed .btn-txt { color: var(--white); }
.btn-txt { position: relative; z-index: 1; }

/* ══ VIDEO ══ */
#screen-video { z-index: 50; background: #000; }
#cutin-video { width: 100%; height: 100%; object-fit: cover; }
#video-fallback { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; gap: 16px; }
#video-fallback.show { display: flex; }
#video-fallback p { font-size: 14px; color: rgba(255,255,255,0.7); letter-spacing: 0.1em; }
#video-fallback button { font-family: 'Zen Kaku Gothic Black',sans-serif; font-size: 14px; color: var(--dark); background: var(--white); border: none; cursor: pointer; padding: 10px 28px; clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%); }
.video-tap-hint { position: absolute; bottom: 18px; right: 18px; font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 0.15em; animation: fadeUp 1s ease 3s both; }

/* ══ VICTORY ══ */
#screen-victory { z-index: 10; background: var(--dark); }
#screen-victory .bg { position: absolute; inset: 0; background: url('assets/start-bg.png') center/cover; opacity: 0.32; }
#screen-victory .vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.92) 100%); }
.victory-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: clamp(10px,2vh,20px); padding: 20px; text-align: center; }
.victory-label { font-size: clamp(9px,1.6vw,12px); color: var(--gold); letter-spacing: 0.35em; text-transform: uppercase; animation: fadeUp 0.5s ease 0.1s both; }

/* 勝利ロゴ画像 */
.victory-logo {
  width: clamp(180px, 40vw, 420px); height: auto;
  animation: victorySlam 0.65s cubic-bezier(0.22,0.61,0.36,1) both;
  filter: drop-shadow(0 4px 24px rgba(255,50,0,0.55));
}
@keyframes victorySlam {
  0%  { transform:scale(0.2) rotate(-8deg); opacity:0; }
  60% { transform:scale(1.18) rotate(2deg); }
  80% { transform:scale(0.95) rotate(-0.5deg); }
  100%{ transform:scale(1) rotate(0); opacity:1; }
}
.victory-skill { font-size: clamp(11px,2vw,15px); color: rgba(255,200,100,0.85); letter-spacing: 0.12em; animation: fadeUp 0.5s ease 0.5s both; }
.victory-dead { width: clamp(70px,14vw,120px); height: clamp(70px,14vw,120px); background: url('assets/enemy-dead.png') center/contain no-repeat; animation: fadeUp 0.5s ease 0.6s both, deadSpin 4s linear 0.6s infinite; opacity: 0.75; }
@keyframes deadSpin { from{transform:rotate(0) scale(1)} 50%{transform:rotate(180deg) scale(1.1)} to{transform:rotate(360deg) scale(1)} }
.replay-btn { font-family: 'Zen Kaku Gothic Black',sans-serif; font-size: clamp(13px,2.2vw,18px); color: var(--white); background: transparent; border: 2px solid rgba(255,255,255,0.55); cursor: pointer; padding: clamp(9px,1.7vh,14px) clamp(22px,5vw,48px); clip-path: polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%); letter-spacing: 0.12em; animation: fadeUp 0.5s ease 0.9s both; transition: background 0.18s,color 0.18s,transform 0.12s; }
.replay-btn:hover { background: var(--white); color: var(--dark); }
.replay-btn:active { transform: scale(0.96); }
.v-particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.vp { position: absolute; border-radius: 50%; animation: vpFly linear infinite; }
@keyframes vpFly { from{transform:translateY(105vh) rotate(0);opacity:0.9} to{transform:translateY(-10vh) rotate(540deg);opacity:0} }

/* ══════════════════════════════════════
   縦画面（portrait）対応
   スマホを縦に持ったとき専用レイアウト
══════════════════════════════════════ */
@media (orientation: portrait) {

  /* ── スタート ── */
  .start-logo { width: clamp(220px, 80vw, 400px); }
  .start-btn-img { width: clamp(180px, 70vw, 320px); }
  .start-eyecatch { font-size: clamp(10px, 3vw, 14px); }

  /* ── バトルUI ── */
  .battle-ui {
    grid-template-rows: auto 1fr auto;
    padding: clamp(8px,1.5vh,14px) clamp(8px,2.5vw,14px);
    gap: 0; /* gapをなくして詰める */
  }

  /* HP */
  .hp-label { font-size: clamp(11px,3vw,14px); }
  .hp-track { height: clamp(10px,2vh,14px); }
  .hp-nums { font-size: clamp(10px,2.5vw,13px); }
  .hp-nums .cur { font-size: 1.5em; }

  /* アリーナ：横並び維持・中央に詰める */
  .arena {
    flex-direction: row;           /* 横並びに戻す */
    align-items: flex-end;
    justify-content: space-around; /* 均等配置で隙間を詰める */
    gap: 0;
    padding: clamp(4px,1vh,8px) clamp(4px,1.5vw,10px);
  }

  .vs-badge {
    display: block;                /* VS表示を復活 */
    font-size: clamp(14px,5vw,22px);
    flex-shrink: 0;
    padding: 0 2px;
  }

  /* キャラクター：現状サイズ感を維持しつつ被らない幅 */
  #player-root {
    width:  clamp(90px, 30vw, 150px);
    height: clamp(105px, 35vw, 170px);
  }
  #enemy-root {
    width:  clamp(95px, 32vw, 155px);
    height: clamp(110px, 37vw, 175px);
  }

  .char-label { font-size: clamp(11px,3vw,13px); }

  /* ボタン：上に詰める・大きく */
  .skill-btn {
    font-size: clamp(16px,5vw,22px);
    padding: clamp(12px,2.5vh,18px) clamp(28px,10vw,60px);
    width: min(88vw, 360px);
  }
  .action-hint { font-size: clamp(11px,3vw,13px); }
  .action-area {
    padding-bottom: clamp(6px,1.5vh,12px);
    padding-top: 0;
    gap: clamp(6px,1.2vh,10px);
  }

  /* ── 動画：16:9 中央配置・黒帯あり ── */
  #screen-video {
    background: #000;
    align-items: center;
    justify-content: center;
  }
  #cutin-video {
    width: 100%;
    height: auto;
    max-height: 100%;
    aspect-ratio: 16 / 9;
    object-fit: contain;   /* 黒帯で余白を埋める */
  }

  /* ── 勝利画面 ── */
  .victory-logo { width: clamp(220px, 78vw, 380px); }
  .victory-skill { font-size: clamp(12px,4vw,16px); }
  .victory-dead { width: clamp(80px,22vw,130px); height: clamp(80px,22vw,130px); }
  .replay-btn {
    font-size: clamp(14px,4.5vw,20px);
    padding: clamp(12px,2.5vh,18px) clamp(28px,8vw,52px);
    width: min(80vw, 300px);
  }
  .victory-label { font-size: clamp(10px,3vw,13px); }
}
</style>
</head>
<body>

<div id="overlay"></div>
<div id="impact-flash"></div>

<!-- START -->
<div id="screen-start" class="screen active">
  <div class="bg"></div><div class="vignette"></div>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="start-content">
    <div class="start-eyecatch">— BATTLE START —</div>
    <img class="start-logo" src="assets/logo.png" alt="わたしはさいきょう！">
    <img class="start-btn-img" src="assets/start.png" alt="はじめる" onclick="goBattle()">
  </div>
</div>

<!-- BATTLE -->
<div id="screen-battle" class="screen">
  <div class="bg"></div><div class="vignette"></div>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="battle-ui">
    <div class="hp-section">
      <div class="hp-block">
        <div class="hp-label">あすちゃん</div>
        <div class="hp-track"><div class="hp-fill player"></div></div>
        <div class="hp-nums"><span class="cur">7</span> / 7</div>
      </div>
      <div class="hp-block right">
        <div class="hp-label">てきモンスター</div>
        <div class="hp-track"><div class="hp-fill enemy"></div></div>
        <div class="hp-nums"><span class="cur">33</span> / 33</div>
      </div>
    </div>
    <div class="arena">
      <div class="player-side">
        <div id="player-root">
          <img id="player-sprite" class="idle" src="assets/player-idle.png" alt="あすちゃん">
          <div id="speed-lines"></div>
          <div id="impact-ring"></div>
        </div>
        <div class="char-label">あすちゃん</div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="enemy-side">
        <div id="enemy-root">
          <img id="enemy-img" src="assets/enemy.png" alt="てきモンスター">
          <div class="dead-flash"></div>
        </div>
        <div class="char-label" id="enemy-label">てきモンスター</div>
      </div>
    </div>
    <div class="action-area" id="action-area">
      <div class="action-hint">▶ わざをえらべ！</div>
      <button class="skill-btn" onclick="activateSkill(this)">
        <span class="btn-txt">⚡ わたしがさいきょう！</span>
      </button>
    </div>
  </div>
</div>

<!-- VIDEO -->
<div id="screen-video" class="screen">
  <video id="cutin-video" playsinline preload="auto" onclick="skipVideo()">
    <source src="assets/cutin.mp4" type="video/mp4">
  </video>
  <div id="video-fallback">
    <p>⚡ 動画を読み込めませんでした</p>
    <button onclick="afterVideo()">つぎへ →</button>
  </div>
  <div class="video-tap-hint">TAP TO SKIP</div>
</div>

<!-- VICTORY -->
<div id="screen-victory" class="screen">
  <div class="bg"></div><div class="vignette"></div>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="v-particles" id="v-particles"></div>
  <div class="victory-content">
    <div class="victory-label">PERFECT VICTORY</div>
    <img class="victory-logo" src="assets/victory.png" alt="しょうり！">
    <div class="victory-skill">「わたしがさいきょう！」が決まった！</div>
    <div class="victory-dead"></div>
    <button class="replay-btn" onclick="resetGame()">もう一度あそぶ</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   AUDIO SYSTEM
══════════════════════════════════════ */
const SND = {};
function loadAudio(key, src, loop) {
  const a = new Audio('assets/' + src);
  a.loop = !!loop;
  a.preload = 'auto';
  SND[key] = a;
}
loadAudio('bgm',             'BGM.mp3',              true);   // ループBGM
loadAudio('punch',           'asu_punch.mp3',         false);  // あすちゃん攻撃
loadAudio('monsterDamage',   'monster_damage.mp3',    false);  // 必殺技後モンスターに当たる
loadAudio('monsterYarareru', 'monster_yarareru.mp3',  false);  // モンスター消滅

function playBGM()  {
  SND.bgm.currentTime = 0;
  SND.bgm.volume = 0.7;
  SND.bgm.play().catch(()=>{});
}
function stopBGM()  { SND.bgm.pause(); }
function pauseBGM() { SND.bgm.pause(); }
function resumeBGM(){ SND.bgm.play().catch(()=>{}); }

function playSE(key, vol) {
  const s = SND[key];
  if (!s) return;
  s.currentTime = 0;
  s.volume = vol !== undefined ? vol : 1.0;
  s.play().catch(()=>{});
}

/* ══════════════════════════════════════
   SPRITE FRAMES
══════════════════════════════════════ */
const FRAMES = [
  { src:'player-idle.png',   ms:9999, tx:  0, sx: 1, idle:true,  instant:false },
  { src:'player-ready.png',  ms: 300, tx:  0, sx: 1, idle:false, instant:true  },
  { src:'player-dash.png',   ms: 500, tx: 55, sx: 1, idle:false, instant:false },
  { src:'player-punch.png',  ms: 350, tx:115, sx: 1, idle:false, instant:false },
  { src:'player-impact.png', ms: 600, tx:115, sx: 1, idle:false, instant:true  }, // 決めポーズ長め
  { src:'player-back.png',   ms: 800, tx:  0, sx:-1, idle:false, instant:false }, // 帰還ゆっくり
];

const playerRoot   = document.getElementById('player-root');
const playerSprite = document.getElementById('player-sprite');
const speedLines   = document.getElementById('speed-lines');
const impactRing   = document.getElementById('impact-ring');
const enemyRoot    = document.getElementById('enemy-root');
const actionArea   = document.getElementById('action-area');
const overlay      = document.getElementById('overlay');
const impactFlash  = document.getElementById('impact-flash');
const video        = document.getElementById('cutin-video');

let seqTimer = null;
let busy = false;

function isPortrait() {
  return window.matchMedia('(orientation: portrait)').matches;
}

function applyFrame(idx) {
  const f = FRAMES[idx];
  playerRoot.classList.toggle('instant', f.instant);

  if (isPortrait()) {
    // 縦画面：X方向ではなくY方向（上へ突進）
    // tx をY方向のマイナス（上）に流用。帰還(idx=5)はY=0に戻す
    const ty = (idx === 2) ? -30 : (idx === 3 || idx === 4) ? -55 : 0;
    // 縦では左右反転なし
    playerRoot.style.transform = `translateY(${ty}%) scaleX(1)`;
  } else {
    playerRoot.style.transform = `translateX(${f.tx}%) scaleX(${f.sx})`;
  }

  playerSprite.src = 'assets/' + f.src;
  playerSprite.className = f.idle ? 'idle' : '';
  speedLines.classList.toggle('show', idx === 2);
}

function runSequence(indices, onDone) {
  let i = 0;
  function step() {
    if (i >= indices.length) { if (onDone) onDone(); return; }
    const fi = indices[i++];
    applyFrame(fi);
    seqTimer = setTimeout(step, FRAMES[fi].ms);
  }
  step();
}

/* ══════════════════════════════════════
   SCREEN MANAGEMENT
══════════════════════════════════════ */
const SCREENS = {
  start:   document.getElementById('screen-start'),
  battle:  document.getElementById('screen-battle'),
  video:   document.getElementById('screen-video'),
  victory: document.getElementById('screen-victory'),
};
function showScreen(name) {
  Object.values(SCREENS).forEach(s => s.classList.remove('active'));
  SCREENS[name].classList.add('active');
}
function fadeOverlay(to, ms, cb) {
  overlay.style.transition = `opacity ${ms}ms ease`;
  overlay.style.opacity = to;
  overlay.style.pointerEvents = to > 0 ? 'all' : 'none';
  if (cb) setTimeout(cb, ms);
}

/* ══════════════════════════════════════
   GAME FLOW
══════════════════════════════════════ */
function goBattle() {
  playBGM(); // ← はじめるを押したタイミングでBGM開始（ユーザー操作起点）
  fadeOverlay(1, 300, () => {
    showScreen('battle');
    applyFrame(0);
    const arena = document.querySelector('.arena');
    arena.classList.remove('arena-animate');
    void arena.offsetWidth;
    arena.classList.add('arena-animate');
    document.querySelector('.action-area').style.animation = 'arenaEnter 0.5s ease 0.5s both';
    fadeOverlay(0, 380);
  });
}

function activateSkill(btn) {
  if (busy) return;
  if (btn) { btn.classList.add('pressed'); setTimeout(()=>btn.classList.remove('pressed'), 180); }
  busy = true;
  actionArea.classList.add('hidden');

  // 攻撃SE
  playSE('punch', 0.9);

  // windup → dash
  runSequence([1, 2], () => {
    applyFrame(3);

    // エフェクト
    impactRing.classList.remove('burst'); void impactRing.offsetWidth; impactRing.classList.add('burst');
    impactFlash.classList.remove('flash'); void impactFlash.offsetWidth; impactFlash.classList.add('flash');
    enemyRoot.classList.remove('hit'); void enemyRoot.offsetWidth; enemyRoot.classList.add('hit');

    // パンチ後 → BGM止めて動画へ
    setTimeout(() => {
      pauseBGM();
      fadeOverlay(1, 280, () => {
        showScreen('video');
        fadeOverlay(0, 250);
        playVideo();
      });
    }, FRAMES[3].ms);
  });
}

function playVideo() {
  const fallback = document.getElementById('video-fallback');
  fallback.classList.remove('show');
  video.currentTime = 0;
  video.muted = false;
  video.volume = 1.0;
  video.onended = afterVideo;
  video.onerror = () => fallback.classList.add('show');
  const p = video.play();
  if (p) p.catch(() => { video.muted = true; video.play().catch(()=>{ fallback.classList.add('show'); }); });
}
function skipVideo() { video.pause(); afterVideo(); }

function afterVideo() {
  video.onended = null;
  fadeOverlay(1, 300, () => {
    showScreen('battle');
    fadeOverlay(0, 280);

    // 決めポーズ
    applyFrame(4);

    // 少し間を置いてから爆発 + monster_damage SE
    setTimeout(() => {
      playSE('monsterDamage', 1.0);
      explodeEnemy();
    }, 300);
  });
}

function explodeEnemy() {
  enemyRoot.classList.add('exploding');
  document.getElementById('enemy-label').style.opacity = '0';

  // 爆発の山（0.8秒後）に消滅SE
  setTimeout(() => {
    playSE('monsterYarareru', 1.0);
  }, 800);

  // 爆発2.0秒後にあすちゃん帰還（ゆっくり800ms）
  setTimeout(() => {
    applyFrame(5);
    // 帰還後→BGM再開→勝利画面（BGMはそのまま流し続ける）
    setTimeout(() => {
      resumeBGM();
      showVictory();
    }, FRAMES[5].ms + 100);
  }, 2000);
}

function showVictory() {
  fadeOverlay(1, 320, () => {
    showScreen('victory');
    fadeOverlay(0, 380);
    spawnParticles();
  });
}

function resetGame() {
  clearTimeout(seqTimer);
  busy = false;
  stopBGM(); // スタート画面に戻るときだけBGM停止
  fadeOverlay(1, 300, () => {
    enemyRoot.classList.remove('exploding','hit');
    actionArea.classList.remove('hidden');
    document.getElementById('enemy-label').style.opacity = '';
    document.getElementById('v-particles').innerHTML = '';
    applyFrame(0);
    showScreen('start');
    fadeOverlay(0, 380);
  });
}

/* ── PARTICLES ── */
function spawnParticles() {
  const c = document.getElementById('v-particles');
  ['#ffcc00','#ff4422','#ffffff','#ff8844','#ffee66','#ff2299'].forEach(col => {
    for (let i = 0; i < 5; i++) {
      const p = document.createElement('div');
      p.className = 'vp';
      const sz = 3 + Math.random() * 7;
      p.style.cssText = `left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${col};animation-duration:${2.5+Math.random()*4}s;animation-delay:${-Math.random()*4}s;`;
      c.appendChild(p);
    }
  });
}
</script>
